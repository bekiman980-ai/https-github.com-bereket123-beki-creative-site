  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

EATIVE<\u002Fspan><\u002Fa>\n    <div style=\"display:flex; gap:22px; flex-wrap:wrap; font-size:14px; color:rgba(235,235,245,.6);\">\n      <a href=\"https://www.instagram.com/beki_creative\" target=\"_blank\" rel=\"noopener\" style=\"color:inherit; text-decoration:none;\">Instagram<\u002Fa>\n      <a href=\"https://www.tiktok.com/@beki_creative\" target=\"_blank\" rel=\"noopener\" style=\"color:inherit; text-decoration:none;\">TikTok<\u002Fa>\n      <a href=\"https://wa.me/251946253661\" target=\"_blank\" rel=\"noopener\" style=\"color:inherit; text-decoration:none;\">+251 94 625 3661<\u002Fa>\n    <\u002Fdiv>\n    <div style=\"font-size:13px; color:rgba(235,235,245,.4);\">© 2026 Beki Creative<\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:900},&quot;accent&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Gold&quot;,&quot;Emerald&quot;,&quot;Ice&quot;,&quot;Rose&quot;],&quot;default&quot;:&quot;Gold&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Look &amp; feel&quot;},&quot;atmosphere&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Midnight&quot;,&quot;Charcoal&quot;,&quot;Plum&quot;],&quot;default&quot;:&quot;Plum&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Look &amp; feel&quot;},&quot;spotlight&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;min&quot;:0,&quot;max&quot;:1.4,&quot;step&quot;:0.05,&quot;default&quot;:1.4,&quot;unit&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Look &amp; feel&quot;}}\">\nclass Component extends DCLogic {\n  state = { region: 'dubai', slug: 'personal-promo' };\n\n  BACK = {\n    dubai: 'Packages.dc.html?region=dubai',\n    ethiopia: 'Packages.dc.html?region=ethiopia'\n  };\n\n  DATA = {\n    dubai: {\n      label: 'Dubai, United Arab Emirates', currency: 'AED', wa: '251946253661',\n      flag: 'linear-gradient(180deg,#00732F 33%,#FFFFFF 33% 66%,#000000 66%)',\n      addons: [\n        { name: 'Extra edited video', price: '+300' },\n        { name: 'Extra 10 photos', price: '+150' },\n        { name: 'Additional location', price: '+200' },\n        { name: 'Drone / aerial shots', price: '+400' },\n        { name: 'Rush 24h delivery', price: '+250' },\n        { name: 'Extra outfit / look', price: '+100' }\n      ],\n      order: ['personal-promo', 'standard', 'brand-business', 'venue', 'private'],\n      packages: {\n        'personal-promo': { name: 'Personal / Promo', badge: 'Most Popular', price: 'from 600', tagline: 'One polished video and a full set of photos — the fastest way to look premium online.', idealFor: 'Personal brands, creators and one-off promos who want a clean, high-end look without a full production.', features: ['1 professionally edited video', '15 retouched photos', '1 outfit / look, 1 location', 'Delivered in 3–5 days', 'Vertical + square formats'] },\n        'standard': { name: 'Standard Package', badge: 'Package', price: 'from 1,000', tagline: 'Double the video, a fuller photo set and priority editing for a bigger moment.', idealFor: 'Businesses and creators who post regularly and want a batch of premium content in one shoot.', features: ['2 professionally edited videos', 'Full retouched photo set', '2 outfits, up to 2 locations', 'Priority editing & color grade', 'Licensed music'] },\n        'brand-business': { name: 'Brand & Business', badge: 'Package', price: 'from 1,500', tagline: 'A tailored content package built around your brand, from direction to delivery.', idealFor: 'Brands and businesses that need a consistent, on-message content library across platforms.', features: ['Custom number of videos', 'Full photo library', 'Multiple locations', 'Brand direction & light scripting', 'Social-ready in every format', 'Revisions included'] },\n        'venue': { name: 'Restaurant / Real Estate', badge: 'On location', price: 'Custom quote', tagline: 'Cinematic coverage of your space, food or property — captured and styled in a single visit.', idealFor: 'Restaurants, hotels, agents and venues that need scroll-stopping location content.', features: ['On-location shoot at your venue', '3+ short-form reels', 'Hero photos of space / dishes', 'Styling & coverage in one visit', 'Optional drone / aerial'] },\n        'private': { name: 'Private / Exclusive', badge: 'By invitation', price: 'On request', tagline: 'A discreet, full-day production with dedicated creative direction and priority delivery.', idealFor: 'High-profile clients who want privacy, a bespoke concept and a same-day priority edit.', features: ['Full dedicated production day', 'Personal creative direction', 'Priority same-day edit', 'NDA & discretion on request', 'Delivered privately'] }\n      }\n    },\n    ethiopia: {\n      label: 'Addis Ababa, Ethiopia', currency: 'ETB', wa: '251946253661',\n      flag: 'linear-gradient(180deg,#078930 33%,#FCDD09 33% 66%,#DA121A 66%)',\n      addons: [\n        { name: 'Extra edited video', price: '+8,000' },\n        { name: 'Extra 10 photos', price: '+4,000' },\n        { name: 'Additional location', price: '+3,000' },\n        { name: 'Drone / aerial shots', price: '+6,000' },\n        { name: 'Rush 24h delivery', price: '+4,000' },\n        { name: 'Extra outfit / look', price: '+2,000' }\n      ],\n      order: ['combo', 'video', 'photo', 'extra', 'private'],\n      packages: {\n        'combo': { name: 'Combo Package', badge: 'Most Popular', price: 'from 17,000', tagline: 'One edited video and a full set of photos with two outfits — our most-booked package.', idealFor: 'Artists, creators and personal brands who want a complete content drop in one shoot.', features: ['1 professionally edited video', '15 retouched photos', '2 outfits / looks', '1 location', 'Delivered in 3–5 days'] },\n        'video': { name: 'Video Only', badge: 'Package', price: '10,000', tagline: 'An hour of coverage cut into one clean, cinematic edit.', idealFor: 'Anyone who just needs a single strong video — a promo, a moment, a release.', features: ['1 hour of coverage', '1 professionally edited video', '1 location', 'Color grade & licensed music'] },\n        'photo': { name: 'Photo Only', badge: 'Package', price: '500 / photo', tagline: 'A professional photo set, retouched and ready to post.', idealFor: 'Portraits, product and personal-brand photos without video.', features: ['Minimum 15 photos', 'Professional retouching', '1 outfit / look', 'Studio or location'] },\n        'extra': { name: 'Same-Day Extra Video', badge: 'Add-on package', price: '+8,000', tagline: 'Add another full video on the same shooting day — no extra setup.', idealFor: 'Clients who want a second concept captured while the team is already on set.', features: ['Additional edited video', 'Same shooting day', 'No extra travel fee', 'Same premium edit'] },\n        'private': { name: 'Private / Exclusive', badge: 'By invitation', price: 'On request', tagline: 'A discreet, full-day production with dedicated creative direction and priority delivery.', idealFor: 'High-profile clients who want privacy, a bespoke concept and a same-day priority edit.', features: ['Full dedicated production day', 'Personal creative direction', 'Priority same-day edit', 'NDA & discretion on request', 'Delivered privately'] }\n      }\n    }\n  };\n\n  componentDidMount() {\n    try {\n      const q = new URLSearchParams(window.location.search);\n      const region = q.get('region');\n      const slug = q.get('slug');\n      const next = {};\n      if (region && this.DATA[region]) next.region = region;\n      const useRegion = next.region || this.state.region;\n      if (slug && this.DATA[useRegion] && this.DATA[useRegion].packages[slug]) next.slug = slug;\n      if (Object.keys(next).length) this.setState(next);\n    } catch (e) {}\n  }\n\n  ACCENTS = {\n    Gold:    { accent: '#D2A63C', soft: 'rgba(210,166,60,.14)', line: 'rgba(210,166,60,.4)', glow2: 'rgba(210,166,60,.45)' },\n    Emerald: { accent: '#3FBF8F', soft: 'rgba(63,191,143,.14)',  line: 'rgba(63,191,143,.4)',  glow2: 'rgba(63,191,143,.4)' },\n    Ice:     { accent: '#5AC8FF', soft: 'rgba(90,200,255,.14)',  line: 'rgba(90,200,255,.4)',  glow2: 'rgba(90,200,255,.4)' },\n    Rose:    { accent: '#E68AA6', soft: 'rgba(230,138,166,.14)', line: 'rgba(230,138,166,.4)', glow2: 'rgba(230,138,166,.42)' }\n  };\n  ATMOS = {\n    Midnight: { bg: '#0A0F1E', glow1: 'rgba(32,71,136,.85)' },\n    Charcoal: { bg: '#111214', glow1: 'rgba(70,74,84,.7)' },\n    Plum:     { bg: '#160F1E', glow1: 'rgba(96,44,120,.8)' }\n  };\n\n  applyTheme(el) {\n    const node = el || this.root;\n    if (!node) return;\n    const a = this.ACCENTS[this.props.accent] || this.ACCENTS.Gold;\n    const at = this.ATMOS[this.props.atmosphere] || this.ATMOS.Midnight;\n    const glow = this.props.spotlight != null ? this.props.spotlight : 1;\n    node.style.setProperty('--bk-accent', a.accent);\n    node.style.setProperty('--bk-accent-soft', a.soft);\n    node.style.setProperty('--bk-accent-line', a.line);\n    node.style.setProperty('--bk-glow-2', a.glow2);\n    node.style.setProperty('--bk-bg', at.bg);\n    node.style.setProperty('--bk-glow-1', at.glow1);\n    node.style.setProperty('--bk-glow', String(glow));\n  }\n\n  componentDidUpdate() { this.applyTheme(); }\n\n  reveal(root) {\n    try {\n      if (!root || root.__bkReveal) return; root.__bkReveal = true;\n      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;\n      const kids = Array.from(root.children).filter(el => {\n        const cs = getComputedStyle(el);\n        return cs.position !== 'fixed' && cs.position !== 'sticky';\n      });\n      const io = new IntersectionObserver(entries => {\n        entries.forEach(e => {\n          if (e.isIntersecting) { e.target.style.opacity = '1'; e.target.style.transform = 'none'; io.unobserve(e.target); }\n        });\n      }, { threshold: 0.08, rootMargin: '0px 0px -8% 0px' });\n      kids.forEach(el => {\n        if (el.getBoundingClientRect().top < window.innerHeight * 0.75) return;\n        el.style.opacity = '0';\n        el.style.transform = 'translateY(44px)';\n        el.style.transition = 'opacity 1.05s cubic-bezier(.22,.61,.36,1), transform 1.05s cubic-bezier(.22,.61,.36,1)';\n        io.observe(el);\n      });\n    } catch (e) {}\n  }\n\n  bindReveal = el => {\n    this.root = el;\n    this.applyTheme(el);\n    if (el && !this._revealed) { this._revealed = true; this.reveal(el); }\n  };\n\n  renderVals() {\n    const region = this.DATA[this.state.region] ? this.state.region : 'dubai';\n    const r = this.DATA[region];\n    const slug = r.packages[this.state.slug] ? this.state.slug : r.order[0];\n    const p = r.packages[slug];\n    const body = `Hello Beki Creative,\\n\\nI'm interested in the ${p.name} package (${r.label}).\\n\\nMy name is: \\nI want to shoot: \\nPreferred date: \\n\\nPlease send me the final price.`;\n    const others = r.order.filter(s => s !== slug).map(s => ({\n      name: r.packages[s].name, price: r.packages[s].price,\n      href: `Package.dc.html?region=${region}&slug=${s}`\n    }));\n    return {\n      rootRef: this.bindReveal,\n      backHref: this.BACK[region],\n      bookHref: 'Book.dc.html?region=' + region,\n      regionLabel: r.label, regionFlag: r.flag, currency: r.currency,\n      name: p.name, badge: p.badge, price: p.price, tagline: p.tagline,\n      idealFor: p.idealFor, features: p.features,\n      addons: r.addons,\n      addonNote: `Add-on prices in ${r.currency}. Mention the ones you want and we'll fold them into your quote.`,\n      others,\n      pkgKey: region + '-' + slug,\n      shotId: `pkgshot-${region}-${slug}`,\n      waHref: `https://wa.me/${r.wa}?text=${encodeURIComponent(body)}`,\n      emailHref: `mailto:bekiman980@gmail.com?subject=${encodeURIComponent('Booking — ' + p.name)}&body=${encodeURIComponent(body)}`\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
